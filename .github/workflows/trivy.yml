name: Trivy Scan Frontend

on:
  push:
  pull_request:
  schedule:
    - cron: '0 2 * * 1'

jobs:
  trivy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner (table)
        uses: aquasecurity/trivy-action@v0.24.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          output: trivy-table.txt
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'

      - name: Show table in log + Summary
        if: always()
        run: |
          echo "========== Trivy (CRITICAL/HIGH) =========="
          cat trivy-table.txt
          echo ""
          echo "### Trivy (filesystem — CRITICAL/HIGH, unfixed ignored)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat trivy-table.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
